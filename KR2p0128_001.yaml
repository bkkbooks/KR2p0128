body:
  text: 散見簡牘合輯湖北雲夢睡虎地四號秦墓木牘二月辛巳黑夫驚敢再拜問中母毋恙也前日黑夫與驚別今復會矣黑夫寄益就書曰遺黑夫錢毋操夏衣來今書節到母視安陸絲布賤可以為禪羣襦者母必為之令與錢偕來其絲布貴徒錢來黑夫自以布此黑夫等直佐淮陽攻反城久傷未可智也母遺黑夫用勿少書到皆為報報必言相家爵來未來告黑夫其未來狀聞王得苟得母恙也辭相家爵不也書衣之南軍毋不也為黑夫驚多問姑姊康樂季須故朮長姑外內為黑夫驚多問東室季須苟得毋恙也為黑夫驚多問嬰泛季事可如定不定為黑夫驚多問夕陽呂嬰𠥮里聞誤丈人得毋恙矣驚多問新負妴得毋恙也新負勉力視瞻丈人毋與勉力也驚敢大心問衷母得毋恙也家室外內同以衷母力毋恙也與從軍與黑夫居皆毋恙也錢衣母幸遺錢五六百䋨布謹善者毋下二丈五尺用垣柏錢矣室弗遺即死矣急急急驚多問新負妴皆得毋恙也新負勉力視瞻兩老驚遠家故衷教詔妴令毋敢遠就若取新衷令聞新地城多空不實者且令故民有為不如令者實為驚視祀若大發毀以驚居反城中故驚敢大心問姑秭姑秭子産得毋恙新地入盜衷唯母方行新地急急
